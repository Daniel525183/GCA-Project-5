<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Well Quest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<header>
  <h1>Well Quest</h1>
</header>
<body>
  <div class="container">
    <p class="game-instructions">Get as many points you can before the time runs out</p>
    <div class="milestone-bar">
      <div class="milestone-header">Milestone Progress</div>
      <div class="progress" role="progressbar" aria-label="Score milestone progress" aria-valuemin="0" aria-valuemax="300" aria-valuenow="0">
        <div id="milestone-progress" class="progress-bar bg-info progress-bar-striped progress-bar-animated" style="width: 0%">0 pts</div>
      </div>
      <div class="milestone-labels">
        <span class="milestone-label" data-milestone="0">0</span>
        <span class="milestone-label" data-milestone="100">100</span>
        <span class="milestone-label" data-milestone="200">200</span>
        <span class="milestone-label" data-milestone="300">300</span>
      </div>
    </div>
    <div class="stats">
      <p>Current Score: <span id="score-card">0</span></p>
      <p>Time Left: <span id="timer">90</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
